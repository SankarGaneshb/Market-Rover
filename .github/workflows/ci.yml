name: CI - Market-Rover

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'investbrand/**'
      - 'pledge_rover/**'
      - 'hil_rover/**'
      - 'market_rover/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'investbrand/**'
      - 'pledge_rover/**'
      - 'hil_rover/**'
      - 'market_rover/**'
  schedule:
    # 03:30 UTC = 09:00 AM IST (Monday to Friday)
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    strategy:
      matrix:
        python-version: ['3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Build Integrity Check (Pre-Flight)
      run: |
        python scripts/build_integrity_check.py

    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        # Exclude satellite modules - they have their own isolated CI pipelines
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=pledge_rover,investbrand,market_rover
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --exclude=pledge_rover,investbrand,market_rover

    - name: Run tests
      run: |
        pytest

    - name: Test imports
      run: |
        python -c "from crew_engine import create_crew; print('[OK] Crew imports OK')"
        python -c "from utils.mock_data import mock_generator; print('[OK] Mock data imports OK')"
        python -c "from utils.report_visualizer import ReportVisualizer; print('[OK] Visualizer imports OK')"

    - name: Validate configuration
      run: |
        python -c "import config; print('[OK] Config loaded successfully')"

    - name: Validate issue assignees/labels
      env:
        GITHUB_ISSUE_ASSIGNEES: ${{ secrets.GITHUB_ISSUE_ASSIGNEES }}
        GITHUB_ISSUE_LABELS: ${{ secrets.GITHUB_ISSUE_LABELS }}
      run: |
        python3 scripts/validate_issue_assignees.py

    - name: Check code structure
      run: |
        echo "Checking project structure..."
        test -f main.py && echo "[OK] main.py exists" || true
        test -f app.py && echo "[OK] app.py exists" || true
        test -f crew_engine.py && echo "[OK] crew_engine.py exists" || true
        test -f config.py && echo "[OK] config.py exists" || true
        test -d utils && echo "[OK] utils/ directory exists" || true
        test -d rover_tools && echo "[OK] rover_tools/ directory exists" || true

    - name: Generate test coverage report
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html || true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install safety
      run: pip install safety

    - name: Check for security vulnerabilities
      run: |
        safety check -r requirements.txt --continue-on-error || true

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install black isort

    - name: Check code formatting with Black
      run: |
        black --check . || echo "[Black] Code formatting issues found. Run 'black .' locally."

    - name: Check import sorting with isort
      run: |
        isort --check-only . || echo "[isort] Import sorting issues found. Run 'isort .' locally."

    - name: Notify HIL on Failure
      if: failure()
      run: |
        pip install requests --quiet
        python scripts/log_build_failure.py "Market-Rover Core CI" "${{ github.run_id }}" "Failure in Python 3.13 tests or build integrity check."
