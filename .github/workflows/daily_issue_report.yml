name: Daily Issue Report

on:
  schedule:
    # Run daily at 12:00 UTC (5:30 PM IST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  discussions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance scipy numpy nselib nsepython requests pandas_market_calendars

    - name: Generate Daily Report
      run: python -m rover_tools.generate_daily_report

    - name: Set Date
      run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Commit Results
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "Docs: Update daily market intelligence report [skip ci]"
        file_pattern: daily_report.md

    - name: Notify HIL on Failure
      if: failure()
      run: |
        curl -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
          -H "Content-Type: application/json" \
          -d '{
            "agent_name": "SRE Support",
            "task_name": "Market-Rover Daily Report Failure",
            "instructions": "Daily Issue Report Generation failed. Review logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} to prevent downtime.",
            "data": {
              "service": "market-rover",
              "action": "DAILY_REPORT_FAILURE",
              "build_id": "${{ github.run_number }}",
              "repo": "${{ github.repository }}",
              "workflow": "daily_issue_report.yml"
            }
          }'
