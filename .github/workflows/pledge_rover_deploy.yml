name: Deploy Pledge-Rover

on:
  push:
    branches: [ main ]
    paths:
      - 'pledge_rover/**'
      - '.github/workflows/pledge_rover_deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: market-rover
  REGION: us-central1
  SERVICE_NAME: pledge-rover
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'pledge_rover/backend/requirements.txt'

      - name: Install dependencies
        working-directory: pledge_rover/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Backend Tests
        working-directory: pledge_rover/backend
        run: pytest -v

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'pledge_rover/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: pledge_rover/frontend
        run: npm ci

      - name: Run Frontend Lint
        working-directory: pledge_rover/frontend
        run: npm run lint

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Container
        working-directory: pledge_rover
        run: |
          gcloud builds submit . --tag gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances market-rover:us-central1:investbrand-db \
            --set-env-vars "PR_DB_NAME=pledge_rover,PR_DB_USER=postgres,PR_DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }},CLOUD_SQL_CONNECTION_NAME=market-rover:us-central1:investbrand-db" \
            --port 8080

      - name: Notify HIL on Failure
        if: failure()
        run: |
          python scripts/log_build_failure.py "Pledge-Rover Deployment" "${{ github.run_id }}" "Deployment failure detected in Docker build or Cloud Run step."
