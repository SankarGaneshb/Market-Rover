name: Deploy investbrand

on:
  push:
    branches: [ main ]
    paths:
      - 'investbrand/**'
      - '.github/workflows/investbrand_deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: market-rover
  REGION: us-central1
  BACKEND_SERVICE: investbrand-api
  FRONTEND_SERVICE: investbrand-ui

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: Invest123
      DB_HOST: localhost
      DB_PORT: 5432
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Invest123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Notify HIL - Build Started
        run: |
          MSG="[IN-PROGRESS] InvestBrand API Build #${{ github.run_number }} has started. Initializing environment and database tests..."
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"InvestBrand Backend Deploy\",
              \"instructions\": \"$MSG\",
              \"status\": \"pending\",
              \"data\": { \"service\": \"investbrand-api\", \"action\": \"DEPLOY_START\", \"build_id\": \"${{ github.run_number }}\" }
            }" || echo "HIL Dashboard unreachable"

      - name: Sync Brand Data to Backend
        run: |
          mkdir -p investbrand/backend/src/data
          cp investbrand/frontend/src/data/brands.js investbrand/backend/src/data/brands.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'investbrand/backend/package-lock.json'

      - name: Install Backend Dependencies
        working-directory: investbrand/backend
        run: npm ci

      - name: Run Backend Unit Tests
        working-directory: investbrand/backend
        run: npm test

      - name: Run Backend Integration Tests
        working-directory: investbrand/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: Invest123
        run: npm run test:integration

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & Push Backend
        run: gcloud builds submit investbrand/backend --tag gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}


      - run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} --platform managed --allow-unauthenticated \
            --set-secrets "JWT_SECRET=investcraft-jwt-secret:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest" \
            --set-env-vars "NODE_ENV=production,IC_DB_NAME=postgres,IC_DB_USER=postgres,IC_DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }},CLOUD_SQL_CONNECTION_NAME=market-rover:us-central1:investcraft-db,IC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            --add-cloudsql-instances market-rover:us-central1:investcraft-db

      - name: Force DB Sync (Seeding)
        continue-on-error: true
        run: |
          gcloud run jobs update investbrand-seeder \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --command "npm" --args "run,seed" \
            --region ${{ env.REGION }} \
            --set-env-vars "NODE_ENV=production,DB_NAME=postgres,DB_USER=postgres,DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }},DB_HOST=/cloudsql/market-rover:us-central1:investcraft-db,CLOUD_SQL_CONNECTION_NAME=market-rover:us-central1:investcraft-db" \
            --set-cloudsql-instances market-rover:us-central1:investcraft-db \
            --task-timeout 300 \
            --quiet || \
          gcloud run jobs create investbrand-seeder \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --command "npm" --args "run,seed" \
            --region ${{ env.REGION }} \
            --set-env-vars "NODE_ENV=production,DB_NAME=postgres,DB_USER=postgres,DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }},DB_HOST=/cloudsql/market-rover:us-central1:investcraft-db,CLOUD_SQL_CONNECTION_NAME=market-rover:us-central1:investcraft-db" \
            --set-cloudsql-instances market-rover:us-central1:investcraft-db \
            --max-retries 0 \
            --task-timeout 300 \
            --quiet
          gcloud run jobs execute investbrand-seeder --region ${{ env.REGION }} --wait

      - name: Notify HIL on Success
        if: success()
        run: |
          MSG="[SUCCESS] InvestBrand API Deployment landed safely! Build ID: ${{ github.run_number }}. Service is now live at us-central1."
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"InvestBrand Backend Deploy Success\",
              \"instructions\": \"$MSG\",
              \"status\": \"completed\",
              \"data\": { \"service\": \"investbrand-api\", \"action\": \"DEPLOY_SUCCESS\", \"build_id\": \"${{ github.run_number }}\" }
            }" || echo "HIL Dashboard unreachable"

      - name: Notify HIL on Failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSG="[ALERT] InvestBrand API Deployment failed. Build ID: ${{ github.run_number }}. Review logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          # Try HIL Dashboard first
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"InvestBrand Backend Deploy Failure\",
              \"instructions\": \"$MSG\",
              \"data\": { \"service\": \"investbrand-api\", \"action\": \"DEPLOY_FAILURE\", \"build_id\": \"${{ github.run_number }}\" }
            }" || python scripts/sre_emergency_fallback.py "InvestBrand Backend Deploy Failure" "$MSG"


  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: investbrand/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Notify HIL - UI Build Started
        run: |
          MSG="[IN-PROGRESS] InvestBrand UI Build #${{ github.run_number }} has started. Optimizing assets and preparing Cloud Run deployment..."
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"InvestBrand Frontend Deploy\",
              \"instructions\": \"$MSG\",
              \"status\": \"pending\",
              \"data\": { \"service\": \"investbrand-ui\", \"action\": \"DEPLOY_START\", \"build_id\": \"${{ github.run_number }}\" }
            }" || echo "HIL Dashboard unreachable"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'investbrand/frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Frontend Tests
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: investbrand-frontend
          directory: investbrand/frontend/coverage/

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Prep Nginx Proxy & Env
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          sed -i "s|http://backend:8080|$BACKEND_URL|g" nginx.conf
          echo "REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > .env
          cat nginx.conf

      - run: |
          gcloud builds submit --tag gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --build-arg "REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
      - run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} --platform managed --allow-unauthenticated

      - name: Notify HIL on Success
        if: success()
        run: |
          MSG="[SUCCESS] InvestBrand UI Deployment landed safely! Build ID: ${{ github.run_number }}. Frontend is updated and live."
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"InvestBrand Frontend Deploy Success\",
              \"instructions\": \"$MSG\",
              \"status\": \"completed\",
              \"data\": { \"service\": \"investbrand-ui\", \"action\": \"DEPLOY_SUCCESS\", \"build_id\": \"${{ github.run_number }}\" }
            }" || echo "HIL Dashboard unreachable"

      - name: Notify HIL on Failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSG="[ALERT] InvestBrand UI Deployment failed. Build ID: ${{ github.run_number }}. Review logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          # Try HIL Dashboard first
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"InvestBrand Frontend Deploy Failure\",
              \"instructions\": \"$MSG\",
              \"data\": { \"service\": \"investbrand-ui\", \"action\": \"DEPLOY_FAILURE\", \"build_id\": \"${{ github.run_number }}\" }
            }" || python scripts/sre_emergency_fallback.py "InvestBrand Frontend Deploy Failure" "$MSG"
