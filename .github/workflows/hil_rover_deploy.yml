name: Deploy HIL-Rover

on:
  push:
    branches: [ main ]
    paths:
      - 'hil_rover/**'
      - '.github/workflows/hil_rover_deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: market-rover
  REGION: us-central1
  SERVICE_NAME: hil-rover
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-check:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Backend Syntax Check
        run: python -m py_compile hil_rover/backend/src/*.py

      - name: Install Backend Dependencies
        working-directory: hil_rover/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Core Dependencies (for check)
        run: |
          cp agents.py config.py hil_rover/
          cp -r rover_tools utils scripts hil_rover/

      - name: HIL-Rover Startup Integrity Check
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # Try importing the app to verify all dependencies and module loads pass
          python -c "from hil_rover.backend.src.server import app; print('[OK] HIL-Rover App loaded successfully')"


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Frontend Deps
        working-directory: hil_rover/frontend
        run: npm ci

      - name: Frontend Lint
        working-directory: hil_rover/frontend
        run: npm run lint || echo "Lint warnings ignored for initial deploy"

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [lint-and-check]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Core Dependencies
        run: |
          cp agents.py config.py hil_rover/
          cp -r rover_tools utils scripts hil_rover/

      - name: Build & Push Container
        run: |
          gcloud builds submit . --config hil_rover/cloudbuild.yaml --substitutions=_SERVICE_NAME=${{ env.SERVICE_NAME }},COMMIT_SHA=${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances market-rover:us-central1:investcraft-db \
            --set-env-vars "HIL_DB_NAME=hil_rover,DB_USER=postgres,DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }},CLOUD_SQL_CONNECTION_NAME=market-rover:us-central1:investcraft-db" \
            --port 8080

      - name: Notify HIL on Failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSG="HIL-Rover Deploy #${{ github.run_number }} failed. Review build logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          # Try the primary HIL Dashboard first
          curl -s -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_name\": \"SRE Support\",
              \"task_name\": \"HIL-Rover Deploy Failure\",
              \"instructions\": \"$MSG\",
              \"data\": { \"service\": \"hil-rover\", \"action\": \"DEPLOY_FAILURE\", \"build_id\": \"${{ github.run_number }}\" }
            }" || \
          # FALLBACK: Create GitHub Issue if HIL Dashboard is unreachable
          python scripts/sre_emergency_fallback.py "HIL-Rover Deploy Failure" "$MSG"
