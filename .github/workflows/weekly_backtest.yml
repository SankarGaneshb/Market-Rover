
name: Weekly Strategy Backtest

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  discussions: write

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance nsepython scipy numpy plotly

    - name: Run Batch Backtester
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.:./rover_tools
        python rover_tools/batch_backtester.py

    - name: Set Date
      run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Commit Results
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "Data: Update weekly backtest registry and reports [skip ci]"
        file_pattern: data/backtest_registry.json backtest_summary.md reports/backtest_summary_*.md
        add_options: '-f'

    - name: Notify HIL on Failure
      if: failure()
      run: |
        curl -X POST "https://hil-rover-9514347926.us-central1.run.app/api/requests" \
          -H "Content-Type: application/json" \
          -d '{
            "agent_name": "SRE Support",
            "task_name": "Market-Rover Backtest Failure",
            "instructions": "Weekly Strategy Backtest failed. Review logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} and verify data sources.",
            "data": {
              "service": "market-rover",
              "action": "WEEKLY_BACKTEST_FAILURE",
              "build_id": "${{ github.run_number }}",
              "repo": "${{ github.repository }}",
              "workflow": "weekly_backtest.yml"
            }
          }'
