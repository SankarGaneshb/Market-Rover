
name: Weekly Strategy Backtest

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  discussions: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance nsepython scipy numpy plotly

    - name: Run Batch Backtester
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.:./rover_tools
        python rover_tools/batch_backtester.py

    - name: Set Date
      run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Commit Results
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "Data: Update weekly backtest registry and reports [skip ci]"
        file_pattern: data/backtest_registry.json backtest_summary.md reports/backtest_summary_*.md
        add_options: '-f'
