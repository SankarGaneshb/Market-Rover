steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE_TAG}'
      - '-f'
      - 'Dockerfile'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '--label'
      - 'service=${_SERVICE_NAME}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE_TAG}']
images:
  - '${_IMAGE_TAG}'
options:
  logging: CLOUD_LOGGING_ONLY
