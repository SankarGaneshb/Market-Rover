[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage — must reach 70% or build fails
addopts =
    --cov=src
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=70
    --cov-config=.coveragerc

# Ensure src.* imports resolve when running from market_rover/backend/
pythonpath = .
